<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
<style>
	:root {
		color-scheme: light dark;
	}
	.fill {
		fill: currentColor;
	}
	.stroke {
		fill: none;
		stroke: currentColor;
	}
	g:target {
		fill-rule: evenodd;
	}
	g.context:target {
		color: context-fill;
		fill-opacity: context-fill-opacity;
	}
	g.theme:target {
		color: transparent /* TO BE REPLACED WITH THEME COLOR */;
	}
	g.prefer-color-scheme.default:target {
		color: light-dark(
			rgb(21, 20, 26), /* https://searchfox.org/mozilla-central/rev/d6576544301cacc0e393fbc919c53e4e6b0d46ec/toolkit/themes/shared/in-content/common-shared.css#16 */
			rgb(251, 251, 254) /* https://searchfox.org/mozilla-central/rev/d6576544301cacc0e393fbc919c53e4e6b0d46ec/browser/themes/shared/browser-custom-colors.css#74 */
		);
	}
	g:not(:target),
	g:target ~ g.mask {
		display: none;
	}
</style>
<symbol id="icon">
  <path class="stroke" d="M1 1h5v5H1z"/>
  <path class="fill" d="M2.5 2.5h2v2h-2z"/>
  <path class="stroke" d="M10 1h5v5h-5z"/>
  <path class="fill" d="M11.5 2.5h2v2h-2z"/>
  <path class="stroke" d="M1 10h5v5H1z"/>
  <path class="fill" d="M2.5 11.5h2v2h-2zM7.5 2H9v1.5H7.5zM7.5 4.5H9V6H7.5zM2 7.5h1.5V9H2zM4.5 7.5H6V9H4.5zM7.5 7.5H9V9H7.5zM10 7.5h1.5V9H10zM12.5 7.5H14V9h-1.5zM7.5 10H9v1.5H7.5zM10 10h1.5v1.5H10zM7.5 12.5H9V14H7.5zM10 12.5h1.5V14H10zM12.5 12.5H14V14h-1.5zM14 10h1.5v1.5H14z"/>
</symbol>
<g id="default-context" class="context default">
	<use href="#icon"/>
</g>
<g id="default-theme" class="theme default">
	<use href="#icon"/>
</g>
<g id="default" class="prefer-color-scheme default">
	<use href="#icon"/>
</g>
</svg>
